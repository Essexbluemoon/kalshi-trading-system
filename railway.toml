# Railway deployment configuration
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# ── API service (primary web service) ─────────────────────────────────────────
[deploy]
startCommand = "sh -c 'cd /app/api && python /app/scripts/migrate.py && python /app/scripts/import_benchmarks.py /app/benchmarks && exec uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Service-specific overrides set in Railway dashboard ───────────────────────
# DATABASE_URL          injected automatically by Railway PostgreSQL plugin
# API_KEY               set manually in Railway Variables
# CORS_ORIGINS          set to your Railway-generated frontend URL
#
# NOTE: This railway.toml applies to both the API and Ingestion services
# (both use root directory "/"). For the Ingestion service, clear the
# Health Check Path in Railway UI (Settings → Deploy → Health Check Path)
# since it is a background worker daemon, not an HTTP server.
