# Railway deployment configuration
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

# ── Shared deploy defaults (all services using this file) ─────────────────────
[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── API service ────────────────────────────────────────────────────────────────
# healthcheckPath is set here and NOT in [deploy] so it does not bleed into
# the ingestion service.  Replace "api-service-name" with the Railway UI name
# for the API service once known, then remove the Railway UI override.
#
# For now, set healthcheckPath = "/health" for the API service in Railway UI:
#   API service → Settings → Deploy → Health Check Path → /health
#
# [services.api-service-name.deploy]
# startCommand = "sh -c 'cd /app/api && python /app/scripts/migrate.py && python /app/scripts/import_benchmarks.py /app/benchmarks && exec uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}'"
# healthcheckPath = "/health"
# healthcheckTimeout = 30
# restartPolicyType = "ON_FAILURE"
# restartPolicyMaxRetries = 3

# ── Ingestion worker (accomplished-victory) ────────────────────────────────────
# No healthcheckPath — Railway will monitor process liveness only.
[services.accomplished-victory.deploy]
startCommand = "sh -c 'cd /app/ingestion && python /app/scripts/migrate.py && exec python run.py'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Service-specific env vars set in Railway dashboard ────────────────────────
# API:       DATABASE_URL (PostgreSQL plugin), API_KEY, CORS_ORIGINS
# Ingestion: DATABASE_URL, KALSHI_API_KEY_ID, KALSHI_PRIVATE_KEY, KALSHI_ENV,
#            POLL_INTERVAL_SECONDS, API_KEY
