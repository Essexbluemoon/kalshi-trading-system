version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kalshi_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kalshi_trading
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app/api                    # hot reload in dev
      - ./ingestion:/app/ingestion:ro     # reconcile + position_manager shared logic
      - ./benchmarks:/app/benchmarks:ro   # for /benchmarks/reload endpoint
    command: sh -c "cd /app/api && exec uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # ── React frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      API_UPSTREAM: http://api:8000
    depends_on:
      - api

  # ── Ingestion service ───────────────────────────────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/kalshi_trading
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    volumes:
      - ./ingestion:/app/ingestion        # hot reload in dev
      - ./benchmarks:/app/benchmarks:ro

volumes:
  postgres_data:
